---
 - name: create user group and base directory
   yum: name="{{ item }}" state=present
   with_items:
        - ksh
        - make
        - sysstat

 - name: create user group
   group:
       name: weblogic #'{{ oracle_group }}'	
       state: present

 - user: 
       name: '{{ oracle_user }}' 
       state: present 
       password: '{{ oracle_password }}'

 - name: create base directory  for weblogic
   file: 
      state: directory
      path: '{{ middleware_home }}' 
      owner: '{{ oracle_user }}'
      group: '{{oracle_group}}'
      
 - name: create domain home for weblogic
   file:
      state: directory
      path: '{{ domains_home }}'
      owner: '{{ oracle_user }}'
      group: '{{ oracle_group }}'

 - name: create application home for weblogic
   file:
      state: directory
      path: '{{ applications_home }}'
      owner: '{{ oracle_user }}'
      group: '{{ oracle_group }}'
  
